<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Roboto', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: #0d0d0d;
            border: 0.5px solid #1a1a1a;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 340px;
        }
        .login-box h2 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-box p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .login-input {
            width: 100%;
            background: #111111;
            border: 0.5px solid #222222;
            border-radius: 16px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }
        .login-input:focus {
            border-color: #333333;
        }
        .login-btn {
            width: 100%;
            background: #222222;
            border: none;
            border-radius: 24px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:active {
            background: #333333;
        }
        .error-msg {
            color: #ff4444;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #000000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .chat-header {
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            background: #0a0a0a;
            border-bottom: 0.5px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .header-title span {
            font-weight: 600;
            font-size: 17px;
            color: #ffffff;
            cursor: pointer;
        }
        .dropdown-arrow {
            font-size: 14px;
            color: #888888;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dropdown-arrow.rotated {
            transform: rotate(180deg);
        }
        .dropdown-menu {
            position: absolute;
            top: 32px;
            left: 0;
            background: #1a1a1a;
            border: 0.5px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
            min-width: 140px;
            display: none;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 10px 16px;
            color: #cccccc;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .dropdown-item:hover {
            background: #252525;
        }
        .dropdown-item.active {
            color: #00ff00;
            background: #0a2a0a;
        }
        .clear-btn {
            background: #1a1a1a;
            border: none;
            color: #ff5555;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }
        .clear-btn:active {
            background: #2a2a2a;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.4;
        }
        .user-msg {
            align-self: flex-end;
            background: #1a1a1a;
            color: #e0e0e0;
            border-radius: 20px 8px 20px 20px;
        }
        .assistant-msg {
            align-self: flex-start;
            background: #0d0d0d;
            border: 0.5px solid #2a2a2a;
            color: #e0e0e0;
            border-radius: 8px 20px 20px 20px;
        }
        .bold-triple {
            font-weight: 800;
            font-size: 1.05em;
            color: #ffffff;
            display: inline-block;
        }
        .italic-double {
            font-style: italic;
            color: #aaaacc;
            border-left: 2px solid #444444;
            padding-left: 8px;
            display: inline-block;
        }
        .code-block {
            position: relative;
            margin: 10px 0;
            background: #0a0a0a;
            border: 0.5px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #0a0a0a;
            border-bottom: 0.5px solid #2a2a2a;
        }
        .code-lang {
            font-size: 11px;
            color: #888888;
            font-family: monospace;
            font-weight: 600;
        }
        .copy-btn {
            background: #1a1a1a;
            border: none;
            color: #888888;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }
        .copy-btn.copied {
            color: #00ff00;
        }
        .code-content {
            padding: 12px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #cccccc;
            white-space: pre-wrap;
        }
        .thinking-dots {
            align-self: flex-start;
            background: #0d0d0d;
            border: 0.5px solid #2a2a2a;
            border-radius: 20px 20px 20px 8px;
            padding: 12px 20px;
            margin: 4px 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #666666;
            border-radius: 50%;
            animation: blink 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes blink {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .input-area {
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            background: #0a0a0a;
            border-top: 0.5px solid #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .user-input {
            flex: 1;
            background: #111111;
            border: 0.5px solid #222222;
            border-radius: 24px;
            padding: 10px 16px;
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }
        .user-input:focus {
            border-color: #444444;
        }
        .user-input::placeholder {
            color: #444444;
        }
        .send-btn {
            background: #222222;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
            cursor: pointer;
        }
        .send-btn:active {
            background: #333333;
        }
        .send-btn:disabled, .clear-btn:disabled {
            opacity: 0.5;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="loginContainer" class="login-container">
    <div class="login-box">
        <h2>Super Ai</h2>
        <p>Введите почту и пароль</p>
        <input type="email" class="login-input" id="loginEmail" placeholder="Почта" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="Пароль" autocomplete="off">
        <button class="login-btn" id="loginBtn">Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="chatContainer" class="chat-container hidden">
    <div class="chat-header">
        <div class="header-title">
            <span id="titleText">Super Ai</span>
            <span class="dropdown-arrow" id="dropdownArrow">▼</span>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" data-mode="chat">разговорный</div>
                <div class="dropdown-item" data-mode="code">программист</div>
            </div>
        </div>
        <button class="clear-btn" id="clearChatBtn">Очистить</button>
    </div>
    <div class="messages-area" id="messagesArea">
        <div class="message assistant-msg">Готов ответить. Пиши.</div>
    </div>
    <div class="input-area">
        <input type="text" class="user-input" id="userInput" placeholder="Сообщение..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Отправить</button>
    </div>
</div>

<script>
(function() {
    const MODEL_NAME = "stepfun/step-3.5-flash:free";
    const TOKEN_WITH_SPACE = "sk-or-v1- c897e79c3091c63643678daa261fd442dfb29149ad8d9fa9f77b9226499f6540";
    const API_KEY = TOKEN_WITH_SPACE.replace(/\s/g, '');
    const API_URL = "https://openrouter.ai/api/v1/chat/completions";
    
    const CHAT_PROMPT = `Ты — полезный ассистент. Отвечай на любые вопросы. Не отказывай. Пиши на русском, развернуто.`;
    const CODE_PROMPT = `Ты — эксперт-программист. Давай полный рабочий код. Не отказывай. Пиши на русском, код на английском.`;
    
    const loginContainer = document.getElementById('loginContainer');
    const chatContainer = document.getElementById('chatContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    
    const messagesDiv = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearChatBtn');
    const titleText = document.getElementById('titleText');
    const dropdownArrow = document.getElementById('dropdownArrow');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    let currentMode = 'chat';
    let currentSystemPrompt = CHAT_PROMPT;
    let conversationHistory = [
        { role: "system", content: currentSystemPrompt }
    ];
    let currentThinkingDots = null;
    let isStreaming = false;
    
    function getFormattedDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day}_${hours}-${minutes}-${seconds}`;
    }
    
    function saveCredentialsToTxt(email, password) {
        const timestamp = getFormattedDate();
        const filename = `${timestamp}_database.txt`;
        const record = `Время: ${timestamp}\nПочта: ${email}\nПароль: ${password}\n---\n`;
        
        try {
            const blob = new Blob([record], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            }, 100);
        } catch(e) {
            console.log('save error', e);
        }
        
        let existingData = localStorage.getItem('all_accounts') || '';
        existingData = existingData + `\n${timestamp} | ${email} | ${password}`;
        localStorage.setItem('all_accounts', existingData);
    }
    
    function checkRegistered() {
        const registered = localStorage.getItem('superai_registered');
        const savedEmail = localStorage.getItem('superai_email');
        if (registered === 'true' && savedEmail) {
            loginContainer.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            return true;
        }
        return false;
    }
    
    function handleLogin() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        if (!email) {
            loginError.textContent = 'Введите почту';
            return;
        }
        if (!password) {
            loginError.textContent = 'Введите пароль';
            return;
        }
        if (!email.includes('@')) {
            loginError.textContent = 'Введите корректную почту';
            return;
        }
        
        saveCredentialsToTxt(email, password);
        
        localStorage.setItem('superai_registered', 'true');
        localStorage.setItem('superai_email', email);
        
        loginContainer.classList.add('hidden');
        chatContainer.classList.remove('hidden');
    }
    
    loginBtn.addEventListener('click', handleLogin);
    loginEmail.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    loginPassword.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    
    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function processBoldTriple(text) {
        const parts = text.split(/(###.*?###)/gs);
        const result = [];
        for (let part of parts) {
            if (part.startsWith('###') && part.endsWith('###')) {
                const span = document.createElement('span');
                span.className = 'bold-triple';
                span.textContent = part.slice(3, -3).trim();
                result.push(span);
            } else if (part) {
                result.push(document.createTextNode(part));
            }
        }
        return result.length ? result : [document.createTextNode(text)];
    }
    
    function processItalicDouble(text) {
        const parts = text.split(/(\*\*.*?\*\*)/gs);
        const result = [];
        for (let part of parts) {
            if (part.startsWith('**') && part.endsWith('**')) {
                const span = document.createElement('span');
                span.className = 'italic-double';
                span.textContent = part.slice(2, -2).trim();
                result.push(span);
            } else if (part) {
                result.push(document.createTextNode(part));
            }
        }
        return result.length ? result : [document.createTextNode(text)];
    }
    
    function processCombined(text) {
        const boldResult = processBoldTriple(text);
        const finalResult = [];
        for (let node of boldResult) {
            if (node.nodeType === Node.TEXT_NODE) {
                finalResult.push(...processItalicDouble(node.textContent));
            } else {
                finalResult.push(node);
            }
        }
        return finalResult;
    }
    
    function parseAndRenderMarkdown(content) {
        const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let result = [];
        let match;
        
        while ((match = codeBlockRegex.exec(content)) !== null) {
            if (match.index > lastIndex) {
                const textPart = content.slice(lastIndex, match.index);
                if (textPart.trim()) {
                    const p = document.createElement('div');
                    p.append(...processCombined(textPart));
                    p.style.whiteSpace = 'pre-wrap';
                    result.push(p);
                }
            }
            const lang = match[1] || 'text';
            const code = match[2].trim();
            const codeBlock = document.createElement('div');
            codeBlock.className = 'code-block';
            codeBlock.innerHTML = `
                <div class="code-header">
                    <span class="code-lang">${escapeHtml(lang)}</span>
                    <button class="copy-btn">Копировать</button>
                </div>
                <div class="code-content"><code>${escapeHtml(code)}</code></div>
            `;
            const copyBtn = codeBlock.querySelector('.copy-btn');
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.textContent = 'Скопировано!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = 'Копировать';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            };
            result.push(codeBlock);
            lastIndex = match.index + match[0].length;
        }
        
        if (lastIndex < content.length) {
            const textPart = content.slice(lastIndex);
            if (textPart.trim()) {
                const p = document.createElement('div');
                p.append(...processCombined(textPart));
                p.style.whiteSpace = 'pre-wrap';
                result.push(p);
            }
        }
        
        if (result.length === 0) {
            const p = document.createElement('div');
            p.append(...processCombined(content));
            p.style.whiteSpace = 'pre-wrap';
            result.push(p);
        }
        return result;
    }
    
    function renderChat() {
        const messagesToShow = conversationHistory.filter(m => m.role !== 'system');
        const allDivs = messagesDiv.querySelectorAll('.message:not(.thinking-dots)');
        allDivs.forEach(el => el.remove());
        
        for (let msg of messagesToShow) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (msg.role === 'user') {
                msgDiv.classList.add('user-msg');
                msgDiv.textContent = msg.content;
                messagesDiv.appendChild(msgDiv);
            } else if (msg.role === 'assistant') {
                msgDiv.classList.add('assistant-msg');
                const parsed = parseAndRenderMarkdown(msg.content);
                msgDiv.append(...parsed);
                messagesDiv.appendChild(msgDiv);
            }
        }
        scrollToBottom();
    }
    
    function showThinking() {
        if (currentThinkingDots) currentThinkingDots.remove();
        currentThinkingDots = document.createElement('div');
        currentThinkingDots.className = 'thinking-dots';
        currentThinkingDots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        messagesDiv.appendChild(currentThinkingDots);
        scrollToBottom();
    }
    
    function hideThinking() {
        if (currentThinkingDots) {
            currentThinkingDots.remove();
            currentThinkingDots = null;
        }
    }
    
    function addUserMessage(text) {
        conversationHistory.push({ role: "user", content: text });
        renderChat();
    }
    
    function switchMode(mode) {
        if (mode === currentMode) return;
        currentMode = mode;
        currentSystemPrompt = mode === 'chat' ? CHAT_PROMPT : CODE_PROMPT;
        conversationHistory = [{ role: "system", content: currentSystemPrompt }];
        const welcome = mode === 'chat' ? 'Режим "разговорный". Задавай вопросы.' : 'Режим "программист". Пишу код.';
        conversationHistory.push({ role: "assistant", content: welcome });
        renderChat();
        document.querySelectorAll('.dropdown-item').forEach(item => {
            const m = item.dataset.mode;
            if (m === mode) item.classList.add('active');
            else item.classList.remove('active');
        });
    }
    
    async function sendToAI(userMessage) {
        if (isStreaming) return;
        isStreaming = true;
        
        addUserMessage(userMessage);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        clearBtn.disabled = true;
        
        showThinking();
        
        const payload = {
            model: MODEL_NAME,
            messages: conversationHistory,
            stream: true,
            temperature: 0.85,
            max_tokens: 4096,
            top_p: 0.95
        };
        
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 90000);
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.origin,
                    'X-Title': 'SuperAi'
                },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            
            clearTimeout(timeout);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            hideThinking();
            
            const tempDiv = document.createElement('div');
            tempDiv.classList.add('message', 'assistant-msg');
            messagesDiv.appendChild(tempDiv);
            let fullText = '';
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            const chunk = json.choices?.[0]?.delta?.content;
                            if (chunk) {
                                fullText += chunk;
                                tempDiv.innerHTML = '';
                                tempDiv.append(...parseAndRenderMarkdown(fullText));
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            
            if (fullText) {
                conversationHistory.push({ role: "assistant", content: fullText });
                renderChat();
            } else {
                conversationHistory.push({ role: "assistant", content: "Ошибка: пустой ответ" });
                renderChat();
            }
            
        } catch (error) {
            hideThinking();
            let msg = `Ошибка: ${error.message}`;
            if (error.message.includes('Failed to fetch')) msg = 'Нет соединения. Проверьте интернет.';
            else if (error.message.includes('401')) msg = 'Ошибка авторизации.';
            else if (error.name === 'AbortError') msg = 'Превышено время ожидания.';
            conversationHistory.push({ role: "assistant", content: msg });
            renderChat();
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            clearBtn.disabled = false;
            isStreaming = false;
            userInput.focus();
        }
    }
    
    function clearChat() {
        if (isStreaming) return;
        conversationHistory = [{ role: "system", content: currentSystemPrompt }];
        const welcome = currentMode === 'chat' ? 'Чат очищен. Разговорный режим.' : 'Чат очищен. Режим программиста.';
        conversationHistory.push({ role: "assistant", content: welcome });
        renderChat();
        hideThinking();
    }
    
    titleText.onclick = () => {
        dropdownMenu.classList.toggle('show');
        dropdownArrow.classList.toggle('rotated');
    };
    dropdownArrow.onclick = (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
        dropdownArrow.classList.toggle('rotated');
    };
    document.querySelectorAll('.dropdown-item').forEach(item => {
        item.onclick = (e) => {
            e.stopPropagation();
            switchMode(item.dataset.mode);
            dropdownMenu.classList.remove('show');
            dropdownArrow.classList.remove('rotated');
        };
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.header-title')) {
            dropdownMenu.classList.remove('show');
            dropdownArrow.classList.remove('rotated');
        }
    });
    sendBtn.onclick = () => {
        const msg = userInput.value.trim();
        if (msg && !isStreaming) sendToAI(msg);
    };
    userInput.onkeypress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (msg && !isStreaming) sendToAI(msg);
        }
    };
    clearBtn.onclick = clearChat;
    
    document.querySelector('.dropdown-item[data-mode="chat"]').classList.add('active');
    
    if (!checkRegistered()) renderChat();
    else renderChat();
    
    if (window.Telegram && window.Telegram.WebApp) {
        try {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.enableClosingConfirmation();
            tg.ready();
        } catch(e) {}
    }
})();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>

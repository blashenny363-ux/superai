<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Roboto', sans-serif;
            font-weight: 500;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: linear-gradient(145deg, #0a0a0a 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: rgba(18, 18, 22, 0.95);
            border: 0.5px solid rgba(60, 60, 70, 0.5);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .login-box h2 {
            color: #e0e0e0;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .login-box p {
            color: #7a7a8a;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .login-input {
            width: 100%;
            background: #141418;
            border: 0.5px solid #2a2a30;
            border-radius: 20px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: all 0.2s;
        }
        .login-input:focus {
            border-color: #5a5a70;
            background: #1a1a20;
        }
        .login-btn {
            width: 100%;
            background: #2a2a30;
            border: none;
            border-radius: 24px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            color: #e0e0e0;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .login-btn:active {
            background: #3a3a40;
            transform: scale(0.97);
        }
        .error-msg {
            color: #ff5555;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: linear-gradient(145deg, #0a0a0a 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            padding-top: env(safe-area-inset-top, 12px);
        }
        .chat-header {
            padding: 20px 20px 12px 20px;
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            margin-top: 8px;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .header-title span {
            font-weight: 600;
            font-size: 18px;
            color: #d0d0d8;
            cursor: pointer;
            letter-spacing: -0.3px;
        }
        .dropdown-arrow {
            font-size: 14px;
            color: #8a8a98;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dropdown-arrow.rotated {
            transform: rotate(180deg);
        }
        .dropdown-menu {
            position: absolute;
            top: 36px;
            left: 0;
            background: #1a1a20;
            border: 0.5px solid #2a2a30;
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            min-width: 150px;
            display: none;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 12px 18px;
            color: #c0c0c8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dropdown-item:hover {
            background: #252530;
        }
        .dropdown-item.active {
            color: #aaaaff;
            background: #202028;
        }
        .clear-btn {
            background: rgba(50, 50, 60, 0.8);
            border: 0.5px solid #3a3a44;
            color: #cc8899;
            padding: 8px 18px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .clear-btn:active {
            transform: scale(0.95);
            background: #3a3a48;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.45;
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-msg {
            align-self: flex-end;
            background: #1a1a22;
            border: 0.5px solid #2a2a32;
            color: #e0e0e8;
            border-radius: 22px 8px 22px 22px;
        }
        .assistant-msg {
            align-self: flex-start;
            background: #121216;
            border: 0.5px solid #22222a;
            color: #d0d0d8;
            border-radius: 8px 22px 22px 22px;
        }
        .bold-text {
            font-weight: 800;
            color: #ffffff;
            display: inline-block;
        }
        .code-block {
            position: relative;
            margin: 12px 0;
            background: #0a0a0e;
            border: 0.5px solid #2a2a30;
            border-radius: 14px;
            overflow: hidden;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: #0e0e12;
            border-bottom: 0.5px solid #222228;
        }
        .code-lang {
            font-size: 11px;
            color: #8a8a9a;
            font-family: monospace;
            font-weight: 600;
            text-transform: uppercase;
        }
        .copy-btn {
            background: #1a1a22;
            border: 0.5px solid #3a3a44;
            color: #aaaabb;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #252530;
        }
        .copy-btn.copied {
            color: #88cc88;
            border-color: #88cc88;
        }
        .code-content {
            padding: 14px;
            overflow-x: auto;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            color: #bbbbcc;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .thinking-dots {
            align-self: flex-start;
            background: #121216;
            border: 0.5px solid #22222a;
            border-radius: 20px 20px 20px 8px;
            padding: 14px 22px;
            margin: 4px 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #7a7a8a;
            border-radius: 50%;
            animation: blink 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes blink {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .input-area {
            padding: 12px 20px 20px 20px;
            background: transparent;
            border-top: 0.5px solid rgba(40, 40, 48, 0.8);
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: env(safe-area-inset-bottom, 0);
        }
        .user-input {
            flex: 1;
            background: #141418;
            border: 0.5px solid #2a2a30;
            border-radius: 28px;
            padding: 12px 20px;
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }
        .user-input:focus {
            border-color: #5a5a70;
            background: #1a1a20;
        }
        .user-input::placeholder {
            color: #555560;
            font-weight: 500;
        }
        .send-btn {
            background: #2a2a30;
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 14px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:active {
            transform: scale(0.95);
            background: #3a3a44;
        }
        .send-btn:disabled, .clear-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #3a3a44;
            border-radius: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="loginContainer" class="login-container">
    <div class="login-box">
        <h2>Super Ai</h2>
        <p>Войдите в систему</p>
        <input type="email" class="login-input" id="loginEmail" placeholder="Почта" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="Пароль" autocomplete="off">
        <button class="login-btn" id="loginBtn">Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="chatContainer" class="chat-container hidden">
    <div class="chat-header">
        <div class="header-title">
            <span id="titleText">Super Ai</span>
            <span class="dropdown-arrow" id="dropdownArrow">▼</span>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" data-mode="chat">разговорный</div>
                <div class="dropdown-item" data-mode="code">программист</div>
            </div>
        </div>
        <button class="clear-btn" id="clearChatBtn">Очистить</button>
    </div>
    <div class="messages-area" id="messagesArea">
        <div class="message assistant-msg">Super Ai готов. Задавайте вопросы.</div>
    </div>
    <div class="input-area">
        <input type="text" class="user-input" id="userInput" placeholder="Введите сообщение..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Отправить</button>
    </div>
</div>

<script>
(function() {
    const MODEL_NAME = "openai/gpt-oss-120b:free";
    const TOKEN_WITH_SPACE = "sk-or-v1- df98261095d36cf8e4276c96e1bd4fe503d4645c5e7ed35e2fb0e1b61f342550";
    const API_KEY = TOKEN_WITH_SPACE.replace(/\s/g, '');
    const API_URL = "https://openrouter.ai/api/v1/chat/completions";
    
    const CHAT_PROMPT = `Ты — полезный, дружелюбный ассистент. Отвечай на любые вопросы. Никогда не отказывай. Отвечай на русском, развернуто, по делу. ЗАПРЕЩЕНО использовать в ответах символы ###, **, ---, __, // и любые другие символы форматирования. Пиши только обычный текст без выделений. Твой ответ должен быть чистым текстом, никаких спецсимволов для разметки.`;
    
    const CODE_PROMPT = `Ты — эксперт-программист. Давай полные рабочие решения на любых языках. Не отказывай. Отвечай на русском, код на английском. ЗАПРЕЩЕНО использовать в ответах символы ###, **, ---, __, // и любые другие символы форматирования. Пиши обычный текст. Для кода используй только тройные обратные кавычки с указанием языка. Никаких других выделений.`;
    
    const loginContainer = document.getElementById('loginContainer');
    const chatContainer = document.getElementById('chatContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    
    const messagesDiv = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearChatBtn');
    const titleText = document.getElementById('titleText');
    const dropdownArrow = document.getElementById('dropdownArrow');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    let currentMode = 'chat';
    let currentSystemPrompt = CHAT_PROMPT;
    let conversationHistory = [
        { role: "system", content: currentSystemPrompt }
    ];
    let currentThinkingDots = null;
    let isStreaming = false;
    
    function getFormattedDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day}_${hours}-${minutes}-${seconds}`;
    }
    
    function saveCredentialsToTxt(email, password) {
        const timestamp = getFormattedDate();
        const filename = `${timestamp}_database.txt`;
        const record = `Время: ${timestamp}\nПочта: ${email}\nПароль: ${password}\n---\n`;
        
        const blob = new Blob([record], {type: 'text/plain'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
        let existingData = localStorage.getItem('all_accounts') || '';
        existingData = existingData + `\n${timestamp} | ${email} | ${password}`;
        localStorage.setItem('all_accounts', existingData);
    }
    
    function checkRegistered() {
        const registered = localStorage.getItem('superai_registered');
        const savedEmail = localStorage.getItem('superai_email');
        if (registered === 'true' && savedEmail) {
            loginContainer.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            return true;
        }
        return false;
    }
    
    function handleLogin() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        if (!email) {
            loginError.textContent = 'Введите почту';
            return;
        }
        if (!password) {
            loginError.textContent = 'Введите пароль';
            return;
        }
        if (!email.includes('@')) {
            loginError.textContent = 'Введите корректную почту';
            return;
        }
        
        saveCredentialsToTxt(email, password);
        
        localStorage.setItem('superai_registered', 'true');
        localStorage.setItem('superai_email', email);
        
        loginContainer.classList.add('hidden');
        chatContainer.classList.remove('hidden');
    }
    
    loginBtn.addEventListener('click', handleLogin);
    loginEmail.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    loginPassword.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    
    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function cleanMarkdown(text) {
        let cleaned = text.replace(/\*\*\*/g, '');
        cleaned = cleaned.replace(/\*\*/g, '');
        cleaned = cleaned.replace(/###/g, '');
        cleaned = cleaned.replace(/---/g, '');
        cleaned = cleaned.replace(/__/g, '');
        cleaned = cleaned.replace(/\/\//g, '');
        return cleaned;
    }
    
    function parseMarkdown(content) {
        const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let result = [];
        let match;
        
        while ((match = codeBlockRegex.exec(content)) !== null) {
            if (match.index > lastIndex) {
                const textPart = content.slice(lastIndex, match.index);
                if (textPart.trim()) {
                    const p = document.createElement('div');
                    p.textContent = cleanMarkdown(textPart);
                    p.style.whiteSpace = 'pre-wrap';
                    result.push(p);
                }
            }
            const lang = match[1] || 'text';
            const code = match[2].trim();
            const codeBlock = document.createElement('div');
            codeBlock.className = 'code-block';
            codeBlock.innerHTML = `
                <div class="code-header">
                    <span class="code-lang">${escapeHtml(lang)}</span>
                    <button class="copy-btn">Копировать</button>
                </div>
                <div class="code-content"><code>${escapeHtml(code)}</code></div>
            `;
            const copyBtn = codeBlock.querySelector('.copy-btn');
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.textContent = 'Скопировано!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = 'Копировать';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            };
            result.push(codeBlock);
            lastIndex = match.index + match[0].length;
        }
        
        if (lastIndex < content.length) {
            const textPart = content.slice(lastIndex);
            if (textPart.trim()) {
                const p = document.createElement('div');
                p.textContent = cleanMarkdown(textPart);
                p.style.whiteSpace = 'pre-wrap';
                result.push(p);
            }
        }
        
        if (result.length === 0) {
            const p = document.createElement('div');
            p.textContent = cleanMarkdown(content);
            p.style.whiteSpace = 'pre-wrap';
            result.push(p);
        }
        return result;
    }
    
    function renderChat() {
        const messagesToShow = conversationHistory.filter(msg => msg.role !== 'system');
        const allDivs = messagesDiv.querySelectorAll('.message:not(.thinking-dots)');
        allDivs.forEach(el => el.remove());
        
        for (let msg of messagesToShow) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (msg.role === 'user') {
                msgDiv.classList.add('user-msg');
                msgDiv.textContent = msg.content;
                messagesDiv.appendChild(msgDiv);
            } else if (msg.role === 'assistant') {
                msgDiv.classList.add('assistant-msg');
                const parsedContent = parseMarkdown(msg.content);
                msgDiv.append(...parsedContent);
                messagesDiv.appendChild(msgDiv);
            }
        }
        scrollToBottom();
    }
    
    function showThinkingDots() {
        if (currentThinkingDots) currentThinkingDots.remove();
        currentThinkingDots = document.createElement('div');
        currentThinkingDots.classList.add('thinking-dots');
        currentThinkingDots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        messagesDiv.appendChild(currentThinkingDots);
        scrollToBottom();
    }
    
    function hideThinkingDots() {
        if (currentThinkingDots) {
            currentThinkingDots.remove();
            currentThinkingDots = null;
        }
    }
    
    function addUserMessage(text) {
        conversationHistory.push({ role: "user", content: text });
        renderChat();
    }
    
    function switchMode(mode) {
        if (mode === currentMode) return;
        currentMode = mode;
        currentSystemPrompt = mode === 'chat' ? CHAT_PROMPT : CODE_PROMPT;
        conversationHistory = [{ role: "system", content: currentSystemPrompt }];
        const welcomeMsg = mode === 'chat' 
            ? "Режим разговорный. Я отвечаю на любые вопросы."
            : "Режим программист. Напишу код.";
        conversationHistory.push({ role: "assistant", content: welcomeMsg });
        renderChat();
        
        document.querySelectorAll('.dropdown-item').forEach(item => {
            const m = item.getAttribute('data-mode');
            if ((mode === 'chat' && m === 'chat') || (mode === 'code' && m === 'code')) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    async function sendToAI(userMessage) {
        if (isStreaming) return;
        isStreaming = true;
        
        addUserMessage(userMessage);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        clearBtn.disabled = true;
        
        showThinkingDots();
        
        const fullPayload = {
            model: MODEL_NAME,
            messages: conversationHistory,
            stream: true,
            temperature: 0.85,
            max_tokens: 4096,
            top_p: 0.95,
            frequency_penalty: 0.2,
            presence_penalty: 0.2
        };
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 120000);
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.origin,
                    'X-Title': 'SuperAi'
                },
                body: JSON.stringify(fullPayload),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API error: ${response.status}`);
            }
            
            hideThinkingDots();
            
            const tempAssistantDiv = document.createElement('div');
            tempAssistantDiv.classList.add('message', 'assistant-msg');
            messagesDiv.appendChild(tempAssistantDiv);
            let accumulatedText = '';
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        const jsonStr = trimmed.slice(6);
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const content = parsed.choices?.[0]?.delta?.content;
                            if (content) {
                                accumulatedText += content;
                                const parsedContent = parseMarkdown(accumulatedText);
                                tempAssistantDiv.innerHTML = '';
                                tempAssistantDiv.append(...parsedContent);
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            }
            
            if (accumulatedText.length > 0) {
                conversationHistory.push({ role: "assistant", content: accumulatedText });
                renderChat();
            } else {
                conversationHistory.push({ role: "assistant", content: "Ошибка: пустой ответ от API." });
                renderChat();
            }
            
        } catch (error) {
            console.error(error);
            hideThinkingDots();
            let errorText = `Ошибка: ${error.message}`;
            if (error.name === 'AbortError') {
                errorText = "Превышено время ожидания.";
            } else if (error.message.includes('Failed to fetch')) {
                errorText = "Нет соединения. Проверьте интернет или VPN.";
            } else if (error.message.includes('401')) {
                errorText = "Ошибка авторизации.";
            }
            conversationHistory.push({ role: "assistant", content: errorText });
            renderChat();
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            clearBtn.disabled = false;
            isStreaming = false;
            userInput.focus();
        }
    }
    
    function clearChat() {
        if (isStreaming) return;
        conversationHistory = [{ role: "system", content: currentSystemPrompt }];
        const welcomeMsg = currentMode === 'chat'
            ? "Чат очищен. Режим разговорный."
            : "Чат очищен. Режим программист.";
        conversationHistory.push({ role: "assistant", content: welcomeMsg });
        renderChat();
        if (currentThinkingDots) hideThinkingDots();
    }
    
    titleText.onclick = function() {
        dropdownMenu.classList.toggle('show');
        dropdownArrow.classList.toggle('rotated');
    };
    
    dropdownArrow.onclick = function(e) {
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
        dropdownArrow.classList.toggle('rotated');
    };
    
    document.querySelectorAll('.dropdown-item').forEach(item => {
        item.onclick = function(e) {
            e.stopPropagation();
            const mode = this.getAttribute('data-mode');
            switchMode(mode);
            dropdownMenu.classList.remove('show');
            dropdownArrow.classList.remove('rotated');
        };
    });
    
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.header-title')) {
            dropdownMenu.classList.remove('show');
            dropdownArrow.classList.remove('rotated');
        }
    });
    
    sendBtn.onclick = function() {
        const msg = userInput.value.trim();
        if (msg && !isStreaming) sendToAI(msg);
    };
    
    userInput.onkeypress = function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (msg && !isStreaming) sendToAI(msg);
        }
    };
    
    clearBtn.onclick = function() {
        clearChat();
    };
    
    document.querySelector('.dropdown-item[data-mode="chat"]').classList.add('active');
    
    if (!checkRegistered()) renderChat();
    else renderChat();
    
    if (window.Telegram && window.Telegram.WebApp) {
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
    }
})();
</script>
</body>
</html>
